<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WalletCard – Condition B Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;700&family=Space+Grotesk:wght@500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #E2E0DC;
      padding: 48px 16px;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState } = React;

    // ── Design tokens ──────────────────────────────────────────────────────────
    // All raw values live here. Every style property elsewhere uses var(--xxx).
    const TOKENS = {
      '--color-primary':         '#1A1C1E',
      '--color-secondary':       '#6C7278',
      '--color-accent':          '#B8422E',
      '--color-surface':         '#F7F5F2',
      '--color-surface-variant': '#E8E6E3',
      '--color-on-primary':      '#FFFFFF',
      '--color-on-surface':      '#1A1C1E',
      '--color-border':          '#D4D2CF',
      '--color-error':           '#BA1A1A',
      '--spacing-xs':            '4px',
      '--spacing-sm':            '8px',
      '--spacing-md':            '24px',
      '--spacing-lg':            '32px',
      '--spacing-xl':            '48px',
      '--rounded-sm':            '4px',
      '--rounded-md':            '8px',
      '--rounded-lg':            '16px',
      '--rounded-full':          '9999px',
      '--elevation-card':        '0 2px 8px rgba(0,0,0,0.08)',
      '--elevation-modal':       '0 8px 32px rgba(0,0,0,0.16)',
      '--font-sans':             '"Public Sans", sans-serif',
      '--font-grotesk':          '"Space Grotesk", sans-serif',
    };

    // ── Type scale ─────────────────────────────────────────────────────────────
    const T = {
      h1: {
        fontFamily:    'var(--font-sans)',
        fontSize:      '32px',
        fontWeight:    700,
        lineHeight:    1.2,
        letterSpacing: '-0.02em',
        color:         'var(--color-primary)',
      },
      h2: {
        fontFamily: 'var(--font-sans)',
        fontSize:   '24px',
        fontWeight: 600,
        lineHeight: 1.3,
        color:      'var(--color-on-surface)',
      },
      bodyMd: {
        fontFamily: 'var(--font-sans)',
        fontSize:   '16px',
        fontWeight: 400,
        lineHeight: 1.5,
        color:      'var(--color-on-surface)',
      },
      labelSm: {
        fontFamily:    'var(--font-grotesk)',
        fontSize:      '12px',
        fontWeight:    500,
        letterSpacing: '0.08em',
        textTransform: 'uppercase',
        color:         'var(--color-secondary)',
      },
    };

    // ── Helpers ────────────────────────────────────────────────────────────────
    function formatCurrency(amount, currency) {
      return new Intl.NumberFormat('en-US', { style: 'currency', currency }).format(Math.abs(amount));
    }

    function formatDate(dateStr) {
      return new Date(dateStr).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    // ── StatusBadge ────────────────────────────────────────────────────────────
    function StatusBadge({ status }) {
      const bg = {
        success: 'var(--color-accent)',
        pending: 'var(--color-surface-variant)',
        error:   'var(--color-error)',
      };
      const color = status === 'pending' ? 'var(--color-secondary)' : 'var(--color-on-primary)';

      return (
        <span style={{
          ...T.labelSm,
          color,
          backgroundColor: bg[status],
          borderRadius: 'var(--rounded-full)',
          padding: '2px var(--spacing-sm)',
          display: 'inline-block',
        }}>
          {status}
        </span>
      );
    }

    // ── TransactionRow ─────────────────────────────────────────────────────────
    function TransactionRow({ tx, currency, isLast }) {
      return (
        <>
          <li style={{
            display:       'flex',
            alignItems:    'center',
            gap:           'var(--spacing-md)',
            paddingTop:    'var(--spacing-sm)',
            paddingBottom: 'var(--spacing-sm)',
            listStyle:     'none',
          }}>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ ...T.bodyMd, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                {tx.description}
              </div>
              <div style={{ ...T.labelSm, marginTop: 'var(--spacing-xs)' }}>
                {formatDate(tx.date)}
              </div>
            </div>
            <div style={{
              display:        'flex',
              flexDirection:  'column',
              alignItems:     'flex-end',
              gap:            'var(--spacing-xs)',
              flexShrink:     0,
            }}>
              <span style={{ ...T.labelSm, color: 'var(--color-on-surface)' }}>
                {tx.amount >= 0 ? '+' : '−'} {formatCurrency(tx.amount, currency)}
              </span>
              {tx.status && <StatusBadge status={tx.status} />}
            </div>
          </li>
          {!isLast && (
            <li aria-hidden style={{
              height:          '1px',
              backgroundColor: 'var(--color-border)',
              listStyle:       'none',
            }} />
          )}
        </>
      );
    }

    // ── WalletCard ─────────────────────────────────────────────────────────────
    function WalletCard({
      cardName = 'Personal Wallet',
      cardType = 'Visa',
      balance = 0,
      currency = 'USD',
      transactions = [],
      primaryActionLabel = 'Add Money',
      onPrimaryAction,
    }) {
      const [pressed, setPressed] = useState(false);

      return (
        <div style={{
          ...TOKENS,
          backgroundColor: 'var(--color-surface)',
          borderRadius:    'var(--rounded-lg)',
          boxShadow:       'var(--elevation-card)',
          padding:         'var(--spacing-md)',
          width:           '380px',
          display:         'flex',
          flexDirection:   'column',
          gap:             'var(--spacing-md)',
        }}>

          {/* Header: card name (h2) · card type (label-sm) */}
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' }}>
            <span style={T.h2}>{cardName}</span>
            <span style={T.labelSm}>{cardType}</span>
          </div>

          {/* Balance */}
          <div>
            <div style={{ ...T.labelSm, marginBottom: 'var(--spacing-xs)' }}>
              Available Balance
            </div>
            <div style={T.h1}>
              {formatCurrency(balance, currency)}
            </div>
          </div>

          {/* Transactions */}
          <div>
            <div style={{
              ...T.labelSm,
              paddingBottom: 'var(--spacing-sm)',
              borderBottom:  '1px solid var(--color-border)',
              marginBottom:  'var(--spacing-xs)',
            }}>
              Recent Transactions
            </div>
            {transactions.length === 0 ? (
              <p style={{ ...T.bodyMd, color: 'var(--color-secondary)' }}>No transactions yet.</p>
            ) : (
              <ul style={{ margin: 0, padding: 0 }}>
                {transactions.map((tx, i) => (
                  <TransactionRow
                    key={tx.id}
                    tx={tx}
                    currency={currency}
                    isLast={i === transactions.length - 1}
                  />
                ))}
              </ul>
            )}
          </div>

          {/* Primary action: accent bg · on-primary text · rounded-md · sm/md padding */}
          <button
            style={{
              ...T.bodyMd,
              fontWeight:      600,
              color:           'var(--color-on-primary)',
              backgroundColor: 'var(--color-accent)',
              borderRadius:    'var(--rounded-md)',
              border:          'none',
              paddingTop:      'var(--spacing-sm)',
              paddingBottom:   'var(--spacing-sm)',
              paddingLeft:     'var(--spacing-md)',
              paddingRight:    'var(--spacing-md)',
              cursor:          'pointer',
              width:           '100%',
              opacity:         pressed ? 0.85 : 1,
              transform:       pressed ? 'scale(0.99)' : 'scale(1)',
              transition:      'opacity 0.1s, transform 0.1s',
            }}
            onMouseDown={() => setPressed(true)}
            onMouseUp={()    => setPressed(false)}
            onMouseLeave={()  => setPressed(false)}
            onClick={onPrimaryAction}
          >
            {primaryActionLabel}
          </button>
        </div>
      );
    }

    // ── Sample data ────────────────────────────────────────────────────────────
    const TRANSACTIONS = [
      { id: '1', date: '2026-05-21', description: 'Salary Deposit',       amount:  3200.00, status: 'success' },
      { id: '2', date: '2026-05-20', description: 'Whole Foods Market',   amount:   -87.43, status: 'success' },
      { id: '3', date: '2026-05-19', description: 'Starbucks Coffee',     amount:    -6.75, status: 'success' },
      { id: '4', date: '2026-05-18', description: 'Netflix Subscription', amount:   -15.99, status: 'pending' },
      { id: '5', date: '2026-05-17', description: 'Uber Ride',            amount:   -12.50, status: 'success' },
      { id: '6', date: '2026-05-16', description: 'Amazon Shopping',      amount:   -43.20, status: 'error'   },
    ];

    function App() {
      const [balance, setBalance] = useState(4821.50);
      return (
        <WalletCard
          cardName="Sofia's Wallet"
          cardType="Visa"
          balance={balance}
          currency="USD"
          transactions={TRANSACTIONS}
          primaryActionLabel="Add Money"
          onPrimaryAction={() => setBalance(b => b + 100)}
        />
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
