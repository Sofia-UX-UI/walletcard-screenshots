<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WalletCard Preview</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, #e0e7ff 0%, #f0f9ff 50%, #ede9fe 100%);
      padding: 40px 16px;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel" data-presets="react,typescript">
    const { useState } = React;

    const CARD_TYPE_COLORS: Record<string, string> = {
      Visa: '#1a1f71',
      Mastercard: '#eb001b',
      AmEx: '#007bc1',
      Debit: '#1d4ed8',
      Credit: '#7c3aed',
    };

    function formatCurrency(amount: number, currency: string): string {
      return new Intl.NumberFormat('en-US', { style: 'currency', currency }).format(Math.abs(amount));
    }

    function formatDate(dateStr: string): string {
      return new Date(dateStr).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    interface Transaction {
      id: string;
      date: string;
      description: string;
      amount: number;
    }

    interface WalletCardProps {
      cardName?: string;
      cardType?: string;
      balance?: number;
      currency?: string;
      transactions?: Transaction[];
      primaryActionLabel?: string;
      onPrimaryAction?: () => void;
    }

    function WalletCard({
      cardName = 'Personal Wallet',
      cardType = 'Visa',
      balance = 4821.5,
      currency = 'USD',
      transactions = [],
      primaryActionLabel = 'Add Money',
      onPrimaryAction,
    }: WalletCardProps) {
      const [pressed, setPressed] = useState(false);
      const badgeColor = CARD_TYPE_COLORS[cardType] ?? '#374151';

      const s: Record<string, React.CSSProperties> = {
        card: {
          fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif',
          width: '380px',
          borderRadius: '24px',
          overflow: 'hidden',
          boxShadow: '0 24px 64px rgba(15,23,42,0.28)',
          background: '#ffffff',
        },
        header: {
          background: 'linear-gradient(145deg, #0f172a 0%, #1e3a8a 60%, #312e81 100%)',
          padding: '28px 28px 36px',
          color: '#fff',
          position: 'relative',
          overflow: 'hidden',
        },
        headerGlow: {
          position: 'absolute',
          top: '-40px',
          right: '-40px',
          width: '180px',
          height: '180px',
          borderRadius: '50%',
          background: 'rgba(99,102,241,0.25)',
          pointerEvents: 'none',
        },
        headerGlow2: {
          position: 'absolute',
          bottom: '-20px',
          left: '60px',
          width: '120px',
          height: '120px',
          borderRadius: '50%',
          background: 'rgba(59,130,246,0.15)',
          pointerEvents: 'none',
        },
        topRow: {
          display: 'flex',
          justifyContent: 'space-between',
          alignItems: 'center',
          marginBottom: '28px',
          position: 'relative',
          zIndex: 1,
        },
        cardName: {
          fontSize: '15px',
          fontWeight: 600,
          letterSpacing: '0.02em',
          color: 'rgba(255,255,255,0.85)',
        },
        badge: {
          fontSize: '11px',
          fontWeight: 700,
          letterSpacing: '0.08em',
          textTransform: 'uppercase',
          padding: '4px 10px',
          borderRadius: '20px',
          backgroundColor: badgeColor,
          color: '#fff',
          border: '1.5px solid rgba(255,255,255,0.25)',
        },
        balanceLabel: {
          fontSize: '12px',
          fontWeight: 500,
          letterSpacing: '0.08em',
          textTransform: 'uppercase',
          color: 'rgba(255,255,255,0.5)',
          marginBottom: '6px',
          position: 'relative',
          zIndex: 1,
        },
        balanceRow: {
          position: 'relative',
          zIndex: 1,
          lineHeight: 1,
        },
        balance: {
          fontSize: '38px',
          fontWeight: 700,
          letterSpacing: '-0.02em',
          color: '#ffffff',
        },
        balanceCents: {
          fontSize: '22px',
          fontWeight: 500,
          opacity: 0.75,
        },
        dotRow: {
          display: 'flex',
          gap: '5px',
          marginTop: '20px',
          position: 'relative',
          zIndex: 1,
          alignItems: 'center',
        },
        dot: {
          width: '7px',
          height: '7px',
          borderRadius: '50%',
          background: 'rgba(255,255,255,0.35)',
          flexShrink: 0,
        },
        body: {
          background: '#ffffff',
          padding: '0 0 24px',
        },
        sectionHeader: {
          display: 'flex',
          justifyContent: 'space-between',
          alignItems: 'center',
          padding: '20px 24px 12px',
        },
        sectionTitle: {
          fontSize: '13px',
          fontWeight: 700,
          letterSpacing: '0.06em',
          textTransform: 'uppercase',
          color: '#94a3b8',
        },
        seeAll: {
          fontSize: '13px',
          fontWeight: 600,
          color: '#3b82f6',
          cursor: 'pointer',
          background: 'none',
          border: 'none',
          padding: 0,
        },
        txList: {
          listStyle: 'none',
          margin: 0,
          padding: '0 0 4px',
        },
        txItem: {
          display: 'flex',
          alignItems: 'center',
          gap: '14px',
          padding: '11px 24px',
        },
        txIcon: {
          width: '40px',
          height: '40px',
          borderRadius: '12px',
          display: 'flex',
          alignItems: 'center',
          justifyContent: 'center',
          flexShrink: 0,
          fontSize: '17px',
        },
        txMeta: {
          flex: 1,
          minWidth: 0,
        },
        txDesc: {
          fontSize: '14px',
          fontWeight: 600,
          color: '#0f172a',
          whiteSpace: 'nowrap',
          overflow: 'hidden',
          textOverflow: 'ellipsis',
        },
        txDate: {
          fontSize: '12px',
          color: '#94a3b8',
          marginTop: '2px',
        },
        divider: {
          height: '1px',
          background: '#f1f5f9',
          margin: '0 24px',
        },
        actionWrap: {
          padding: '16px 24px 0',
        },
        actionBtn: {
          width: '100%',
          padding: '15px',
          borderRadius: '14px',
          border: 'none',
          background: pressed
            ? 'linear-gradient(135deg, #1d4ed8, #4338ca)'
            : 'linear-gradient(135deg, #2563eb, #4f46e5)',
          color: '#fff',
          fontSize: '15px',
          fontWeight: 700,
          letterSpacing: '0.01em',
          cursor: 'pointer',
          boxShadow: pressed
            ? '0 2px 8px rgba(37,99,235,0.3)'
            : '0 6px 20px rgba(37,99,235,0.4)',
          transform: pressed ? 'scale(0.98)' : 'scale(1)',
          transition: 'all 0.15s ease',
        },
      };

      function txAmountStyle(positive: boolean): React.CSSProperties {
        return {
          fontSize: '14px',
          fontWeight: 700,
          color: positive ? '#10b981' : '#0f172a',
          flexShrink: 0,
        };
      }

      function iconFor(desc: string): string {
        const d = desc.toLowerCase();
        if (d.includes('coffee') || d.includes('cafe') || d.includes('starbucks')) return '☕';
        if (d.includes('uber') || d.includes('lyft') || d.includes('ride')) return '🚗';
        if (d.includes('grocery') || d.includes('market') || d.includes('whole foods')) return '🛒';
        if (d.includes('netflix') || d.includes('spotify') || d.includes('apple')) return '📱';
        if (d.includes('gym') || d.includes('fitness')) return '💪';
        if (d.includes('salary') || d.includes('payroll') || d.includes('deposit')) return '💸';
        if (d.includes('amazon') || d.includes('shop')) return '📦';
        if (d.includes('restaurant') || d.includes('dinner') || d.includes('sushi')) return '🍽️';
        return '💳';
      }

      function iconBg(amount: number): string {
        return amount > 0 ? 'rgba(16,185,129,0.1)' : 'rgba(99,102,241,0.1)';
      }

      const [whole, dec] = formatCurrency(balance, currency).split('.');

      return (
        <div style={s.card}>
          <div style={s.header}>
            <div style={s.headerGlow} />
            <div style={s.headerGlow2} />
            <div style={s.topRow}>
              <span style={s.cardName}>{cardName}</span>
              <span style={s.badge}>{cardType}</span>
            </div>
            <div style={s.balanceLabel}>Available Balance</div>
            <div style={s.balanceRow}>
              <span style={s.balance}>
                {whole}
                {dec !== undefined && <span style={s.balanceCents}>.{dec}</span>}
              </span>
            </div>
            <div style={s.dotRow}>
              {[0,1,2,3].map(i => <div key={i} style={s.dot} />)}
              <div style={{ width: '12px' }} />
              {[4,5,6,7].map(i => <div key={i} style={s.dot} />)}
              <div style={{ width: '12px' }} />
              {[8,9,10,11].map(i => <div key={i} style={s.dot} />)}
              <div style={{ width: '12px' }} />
              <span style={{ ...s.cardName, fontSize: '13px', opacity: 0.6, letterSpacing: '0.12em' }}>
                8492
              </span>
            </div>
          </div>

          <div style={s.body}>
            <div style={s.sectionHeader}>
              <span style={s.sectionTitle}>Transactions</span>
              <button style={s.seeAll}>See all</button>
            </div>

            {transactions.length === 0 ? (
              <div style={{ padding: '16px 24px 8px', color: '#94a3b8', fontSize: '14px' }}>
                No transactions yet.
              </div>
            ) : (
              <ul style={s.txList}>
                {transactions.map((tx, idx) => (
                  <React.Fragment key={tx.id}>
                    <li style={s.txItem}>
                      <div style={{ ...s.txIcon, background: iconBg(tx.amount) }}>
                        {iconFor(tx.description)}
                      </div>
                      <div style={s.txMeta}>
                        <div style={s.txDesc}>{tx.description}</div>
                        <div style={s.txDate}>{formatDate(tx.date)}</div>
                      </div>
                      <div style={txAmountStyle(tx.amount > 0)}>
                        {tx.amount > 0 ? '+' : '−'}&nbsp;{formatCurrency(tx.amount, currency)}
                      </div>
                    </li>
                    {idx < transactions.length - 1 && <div style={s.divider} />}
                  </React.Fragment>
                ))}
              </ul>
            )}

            <div style={s.actionWrap}>
              <button
                style={s.actionBtn}
                onMouseDown={() => setPressed(true)}
                onMouseUp={() => setPressed(false)}
                onMouseLeave={() => setPressed(false)}
                onClick={onPrimaryAction}
              >
                {primaryActionLabel}
              </button>
            </div>
          </div>
        </div>
      );
    }

    const sampleTransactions: Transaction[] = [
      { id: '1', date: '2026-05-21', description: 'Salary Deposit',         amount:  3200.00 },
      { id: '2', date: '2026-05-20', description: 'Whole Foods Market',     amount:   -87.43 },
      { id: '3', date: '2026-05-19', description: 'Starbucks Coffee',       amount:    -6.75 },
      { id: '4', date: '2026-05-18', description: 'Netflix Subscription',   amount:   -15.99 },
      { id: '5', date: '2026-05-17', description: 'Uber Ride',              amount:   -12.50 },
      { id: '6', date: '2026-05-16', description: 'Amazon Shopping',        amount:   -43.20 },
    ];

    function App() {
      const [balance, setBalance] = useState(4821.50);

      return (
        <WalletCard
          cardName="Sofia's Wallet"
          cardType="Visa"
          balance={balance}
          currency="USD"
          transactions={sampleTransactions}
          primaryActionLabel="Add Money"
          onPrimaryAction={() => setBalance(b => b + 100)}
        />
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
